name: Build and Release AudioSorter

on:
  push:
    tags:
      - 'v*' # Trigger on version tags like v1.0.1

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    outputs:
      release_tag: ${{ github.ref_name }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libpulse-dev libasound2-dev libegl1-mesa

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy PyQt6 PyQt6-Multimedia qt-material pyinstaller

    - name: Run Build Script
      run: python build.py

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binary-${{ runner.os }}
        path: dist/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v4

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          binary-Windows-latest/*
          binary-Ubuntu-latest/*
        tag_name: ${{ needs.build.outputs.release_tag }}
        name: Release ${{ needs.build.outputs.release_tag }}
        body: "Automated build of AudioSorter for ${{ needs.build.outputs.release_tag }}"
        draft: false
        prerelease: false